<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#241640"/>
      <stop offset="55%" stop-color="#120a24"/>
      <stop offset="100%" stop-color="#070410"/>
    </radialGradient>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9D4EDD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E91E8C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="96" cy="120" r="2.4" opacity="0.7"/>
    <circle cx="420" cy="96" r="3" opacity="0.85"/>
    <circle cx="372" cy="170" r="1.8" opacity="0.55"/>
    <circle cx="140" cy="200" r="1.8" opacity="0.5"/>
    <circle cx="450" cy="240" r="2.2" opacity="0.6"/>
    <circle cx="64" cy="280" r="2" opacity="0.5"/>
  </g>

  <!-- soft glow behind the arch -->
  <g fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M76 372 A 180 180 0 0 1 436 372" stroke="#9D4EDD" stroke-width="64"/>
  </g>

  <!-- rainbow bridge: stacked bands outer -> inner -->
  <g fill="none" stroke-linecap="round">
    <path d="M76 372 A 180 180 0 0 1 436 372" stroke="#7B2FBE" stroke-width="26"/>
    <path d="M102 372 A 154 154 0 0 1 410 372" stroke="#9D4EDD" stroke-width="26"/>
    <path d="M128 372 A 128 128 0 0 1 384 372" stroke="#4ECDC4" stroke-width="26"/>
    <path d="M154 372 A 102 102 0 0 1 358 372" stroke="#E040FB" stroke-width="26"/>
    <path d="M180 372 A 76 76 0 0 1 332 372" stroke="#E91E8C" stroke-width="26"/>
    <path d="M206 372 A 50 50 0 0 1 306 372" stroke="#F48FB1" stroke-width="26"/>
  </g>

  <!-- bridge footing / horizon -->
  <rect x="48" y="368" width="416" height="8" rx="4" fill="url(#base)"/>

  <!-- Heimdall's watch star at the apex -->
  <g transform="translate(256 150)">
    <circle r="34" fill="#4ECDC4" opacity="0.20"/>
    <circle r="20" fill="#9bf6ec" opacity="0.30"/>
    <path d="M0 -30 L7 -7 L30 0 L7 7 L0 30 L-7 7 L-30 0 L-7 -7 Z" fill="#ffffff"/>
    <circle r="6" fill="#4ECDC4"/>
  </g>
</svg>
