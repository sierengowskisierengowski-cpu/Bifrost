name: Bifrost Build Release
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
permissions:
  contents: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/bifrost-desktop/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: agent/go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            zstd

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil aiohttp pydantic

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build monolithic package
        run: ./package_monolithic.sh

      - name: Create Arch Linux package
        run: |
          chmod +x scripts/create-arch-pkg.sh
          scripts/create-arch-pkg.sh

      - name: Set release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SHORT_SHA }}
          name: Bifrost ${{ env.SHORT_SHA }}
          generate_release_notes: true
          files: |
            app/bifrost-desktop/src-tauri/target/release/bifrost
            bifrost-*.pkg.tar.zst
